name: stridelabs_slauth
description: "slauth (Ory Hydra + Kratos) OAuth2 PKCE client for StrideLabs native apps — system-browser login, token refresh with rotation, and a debug-only headless login."
version: 0.1.0
publish_to: 'none'

environment:
  sdk: ^3.12.2

# Extraction-ready: this package imports nothing from the host app. Its deps are
# the minimal set needed for the PKCE flow, token lifecycle, and at-rest storage.
dependencies:
  flutter:
    sdk: flutter

  # HTTP client for slauth's token/authorize endpoints + the headless login.
  dio: ^5.7.0
  # Session-cookie persistence for the headless (Kratos → Hydra) redirect chain.
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8

  # OAuth2 system-browser flow (custom-scheme redirect back into the app).
  flutter_web_auth_2: ^5.0.2

  # Access/refresh/id token at rest on mobile (keychain/keystore).
  flutter_secure_storage: ^10.3.1
  # Inspect access-token claims/expiry client-side.
  jwt_decoder: ^2.0.1
  # PKCE code-verifier/challenge hashing (S256).
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Deterministic time for the proactive-refresh / dedup tests.
  fake_async: ^1.3.1
